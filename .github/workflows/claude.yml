name: Claude Code Review

on:
  # zizmor: ignore[dangerous-triggers]
  # pull_request_target is required to access secrets for fork PRs.
  pull_request_target:
    branches: ["main"]
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  claude-review:
    permissions:
      contents: read
      pull-requests: write # post review comments
      issues: read # read issue context for review
      actions: read # read workflow run context
    uses: mozilla/actions/.github/workflows/claude-review.yml@25cb84d060946c0ad6d2c3f79da479b16d180d71 # v1.1.0
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
